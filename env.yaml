# Full environment for building this deck on a fresh machine.
#   conda env create -f env.yaml
#   conda activate edit-ai-seminar
#   pnpm install          # pulls @slidev/cli etc. into node_modules
#   pnpm dev              # start the slide dev server
name: outreach_talks
channels:
  - conda-forge
dependencies:
  - python>=3.11   # tomllib requires 3.11+
  - ffmpeg         # encode / remux
  - rclone         # videos:sync from gdrive
  - gh             # videos:publish / videos:publish-hq to GitHub Releases
  - nodejs>=20     # runtime for slidev
  - pnpm           # package manager; installs @slidev/cli per-project
