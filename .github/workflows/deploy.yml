name: Deploy talks to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - name: Build every talk under talks/*
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          mkdir -p site
          for d in talks/*/; do
            talk=$(basename "$d")
            echo "::group::Building $talk"
            (cd "$d" && pnpm build \
              --base "/${REPO_NAME}/${talk}/" \
              --out "${GITHUB_WORKSPACE}/site/${talk}")
            echo "::endgroup::"
          done

      - name: Write index.html listing all talks
        run: |
          {
            echo '<!doctype html><meta charset=utf-8>'
            echo '<title>Outreach talks</title>'
            echo '<style>body{font-family:system-ui;max-width:40rem;margin:3rem auto;padding:0 1rem}a{display:block;padding:.5rem 0}</style>'
            echo '<h1>Outreach talks</h1><ul>'
            for d in talks/*/; do
              talk=$(basename "$d")
              echo "<li><a href=\"./${talk}/\">${talk}</a></li>"
            done
            echo '</ul>'
          } > site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
