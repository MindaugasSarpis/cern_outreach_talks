# Source of truth for all video assets used in this deck.
#
# Raws live in `videos/raw/` (gitignored, mirrored from Google Drive via
# `pnpm videos:sync`). Encoded web copies go to `public/videos/` (also
# gitignored, published to the GitHub Release tagged `videos`).
#
# Workflow:
#   1. Drop a new raw in videos/raw/ (or `pnpm videos:sync` from Drive)
#   2. Add an entry below with the right profile
#   3. `pnpm videos:encode`  - regenerates web copies (idempotent)
#   4. `pnpm videos:publish` - uploads to GH Release for the deployed build
#
# Profiles:
#   remux          - lossless stream copy + faststart. Use when source is already
#                    a well-encoded web codec (HEVC/H.264 <= ~5 Mbps).
#   standard       - HEVC CRF 24, 1080p cap, AAC 128k. General-purpose re-encode.
#   standard-tight - HEVC CRF 27, 1080p cap. Aggressive for long clips.
#   silent-loop    - HEVC CRF 26, 1080p cap, audio stripped. Background loops.
#   high-motion    - HEVC CRF 22, 1080p cap, AAC 192k. Sims, fast action, CGI.

[defaults]
# TODO: set to your rclone remote, e.g. "gdrive:EditAI_videos/raw"
source_remote = "gdrive:EditAI_videos/raw"
release_tag    = "videos"        # encoded web copies
release_tag_hq = "videos-hq"     # raw masters for HQ playback
max_size_mb    = 200             # warn if encoded output exceeds this

# Add [[videos]] entries as you drop raws into videos/raw/.
#
# [[videos]]
# name    = "Example.mp4"
# profile = "remux"
# used_in = ["deck"]
# notes   = "..."
